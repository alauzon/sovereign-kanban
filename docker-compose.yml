version: '3.8'

services:
  nextcloud:
    image: nextcloud:latest
    container_name: sovereign-kanban-dev
    ports:
      - "8080:80"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
      MYSQL_ROOT_PASSWORD: root
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
    volumes:
      - ./apps/sovereign-kanban-md-persistence:/var/www/html/apps/sovereign-kanban-md-persistence
      - nextcloud-data:/var/www/html/data
    depends_on:
      - db
    networks:
      - sovereign-kanban

  db:
    image: mariadb:latest
    container_name: sovereign-kanban-db
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - sovereign-kanban

volumes:
  nextcloud-data:
  db-data:

networks:
  sovereign-kanban:
